<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC Drug Product Database</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ── Design tokens ── */
        :root {
            --blue-deep:   #1A3A5C;
            --blue-mid:    #2356A0;
            --teal:        #2A7F8F;
            --teal-light:  #E6F4F6;
            --grey-50:     #F7F8FA;
            --grey-100:    #EDEEF1;
            --grey-300:    #C4C8D0;
            --grey-500:    #7B828F;
            --grey-900:    #1C1F26;
            --white:       #FFFFFF;
            --danger:      #C0392B;
            --radius:      6px;
            --shadow-sm:   0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
            --shadow-md:   0 4px 12px rgba(0,0,0,.10);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--grey-50);
            color: var(--grey-900);
            font-size: 14px;
            line-height: 1.5;
            min-height: 100vh;
        }

        /* ── Top bar ── */
        header {
            background: var(--blue-deep);
            color: var(--white);
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-md);
        }
        .header-flag {
            width: 36px;
            height: 24px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }
        .header-flag svg {
            width: 36px;
            height: 24px;
            border-radius: 2px;
            box-shadow: 0 0 0 1px rgba(255,255,255,.15);
        }
        header h1 {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: .01em;
        }
        header .subtitle {
            font-size: 12px;
            color: rgba(255,255,255,.6);
            margin-left: auto;
            white-space: nowrap;
        }

        /* ── Layout ── */
        main {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px 16px 48px;
        }

        /* ── Filter card ── */
        .filter-card {
            background: var(--white);
            border: 1px solid var(--grey-100);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 16px;
        }
        .filter-card h2 {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--grey-500);
            margin-bottom: 14px;
        }
        .filter-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1 1 220px;
        }
        .filter-group label {
            font-size: 12px;
            font-weight: 500;
            color: var(--grey-500);
        }
        .filter-group input {
            height: 38px;
            border: 1px solid var(--grey-300);
            border-radius: var(--radius);
            padding: 0 12px;
            font-size: 14px;
            font-family: inherit;
            color: var(--grey-900);
            transition: border-color .15s, box-shadow .15s;
            background: var(--white);
        }
        .filter-group input:focus {
            outline: none;
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(42,127,143,.15);
        }
        .filter-group input::placeholder { color: var(--grey-300); }

        .filter-actions {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-shrink: 0;
        }
        button {
            height: 38px;
            padding: 0 18px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: background .15s, box-shadow .15s;
            border: none;
        }
        .btn-primary {
            background: var(--teal);
            color: var(--white);
        }
        .btn-primary:hover { background: var(--blue-mid); box-shadow: var(--shadow-sm); }
        .btn-ghost {
            background: transparent;
            color: var(--grey-500);
            border: 1px solid var(--grey-300);
        }
        .btn-ghost:hover { background: var(--grey-50); color: var(--grey-900); }

        /* ── Active filter pills ── */
        .active-filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
            min-height: 0;
        }
        .filter-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--teal-light);
            color: var(--teal);
            border: 1px solid rgba(42,127,143,.25);
            border-radius: 100px;
            padding: 3px 10px 3px 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .filter-pill button {
            height: auto;
            width: 16px;
            height: 16px;
            padding: 0;
            background: rgba(42,127,143,.2);
            color: var(--teal);
            border-radius: 50%;
            font-size: 11px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .filter-pill button:hover { background: var(--teal); color: var(--white); }

        /* ── Results meta bar ── */
        .results-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .results-count {
            font-size: 13px;
            color: var(--grey-500);
        }
        .results-count strong { color: var(--grey-900); }

        /* ── Table wrapper ── */
        .table-wrapper {
            background: var(--white);
            border: 1px solid var(--grey-100);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }
        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 13px;
        }
        thead tr {
            background: var(--grey-50);
            border-bottom: 2px solid var(--grey-100);
        }
        th {
            padding: 11px 14px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--grey-500);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }
        th:hover { color: var(--teal); }
        th.sort-asc::after  { content: ' ↑'; color: var(--teal); }
        th.sort-desc::after { content: ' ↓'; color: var(--teal); }

        tbody tr {
            border-bottom: 1px solid var(--grey-100);
            transition: background .1s;
        }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: var(--teal-light); }

        td {
            padding: 11px 14px;
            vertical-align: top;
            color: var(--grey-900);
        }

        /* Column-specific styles */
        .col-din {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--blue-mid);
            font-weight: 600;
            white-space: nowrap;
        }
        .col-din a {
            color: var(--blue-mid);
            text-decoration: none;
            border-bottom: 1px dashed var(--blue-mid);
        }
        .col-din a:hover {
            color: var(--teal);
            border-bottom-color: var(--teal);
        }
        .col-brand { font-weight: 500; }
        .col-date {
            white-space: nowrap;
            color: var(--grey-500);
            font-size: 12px;
        }
        .col-ingredients {
            max-width: 260px;
            color: var(--grey-500);
            font-size: 12px;
            line-height: 1.6;
        }

        /* ── Loading state ── */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 64px 24px;
            gap: 16px;
            color: var(--grey-500);
            background: var(--white);
            border: 1px solid var(--grey-100);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--grey-100);
            border-top-color: var(--teal);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-label { font-size: 14px; font-weight: 500; }
        .loading-sub   { font-size: 12px; color: var(--grey-300); }

        /* ── Empty / error states ── */
        .state-box {
            text-align: center;
            padding: 56px 24px;
            background: var(--white);
            border: 1px solid var(--grey-100);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
        }
        .state-icon { font-size: 36px; margin-bottom: 12px; }
        .state-title { font-size: 16px; font-weight: 600; color: var(--grey-900); margin-bottom: 6px; }
        .state-body  { font-size: 13px; color: var(--grey-500); }

        /* ── Pagination ── */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .page-btn {
            height: 32px;
            min-width: 32px;
            padding: 0 10px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 500;
            background: var(--white);
            border: 1px solid var(--grey-100);
            color: var(--grey-900);
            cursor: pointer;
            transition: all .15s;
        }
        .page-btn:hover:not(:disabled) { border-color: var(--teal); color: var(--teal); }
        .page-btn.active { background: var(--teal); color: var(--white); border-color: var(--teal); }
        .page-btn:disabled { opacity: .4; cursor: default; }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            header h1 { font-size: 13px; }
            header .subtitle { display: none; }
            .filter-row { flex-direction: column; }
            .filter-actions { width: 100%; }
            .filter-actions button { flex: 1; }
            th, td { padding: 9px 10px; }
        }
    </style>
</head>

<body>
    <header>
        <div class="header-flag" aria-label="Canadian flag">
            <svg viewBox="0 0 36 24" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
                <!-- Left red band -->
                <rect x="0" y="0" width="9" height="24" fill="#D52B1E"/>
                <!-- White centre -->
                <rect x="9" y="0" width="18" height="24" fill="#FFFFFF"/>
                <!-- Right red band -->
                <rect x="27" y="0" width="9" height="24" fill="#D52B1E"/>
                <!-- Maple leaf (centred on white band) -->
                <path transform="translate(18,12) scale(0.038)" fill="#D52B1E"
                      d="M0,-130 L15,-80 L65,-90 L45,-50 L90,-20 L55,-15 L60,30
                         L30,20 L30,80 L0,70 L-30,80 L-30,20 L-60,30 L-55,-15
                         L-90,-20 L-45,-50 L-65,-90 L-15,-80 Z"/>
            </svg>
        </div>
        <h1>Health Canada — Drug Product Database</h1>
        <span class="subtitle">Approved Non-Prescription Human Drugs · Updated Nightly</span>
    </header>

    <main>
        <div class="filter-card">
            <h2>Filter results</h2>
            <div class="filter-row">
                <div class="filter-group">
                    <label for="companyFilter">Company name</label>
                    <input type="text" id="companyFilter" placeholder="e.g. Pfizer">
                </div>
                <div class="filter-group">
                    <label for="ingredientFilter">Active ingredient</label>
                    <input type="text" id="ingredientFilter" placeholder="e.g. ibuprofen">
                </div>
                <div class="filter-actions">
                    <button class="btn-primary" onclick="applyFilters()">Apply</button>
                    <button class="btn-ghost"   onclick="resetFilters()">Clear</button>
                </div>
            </div>
            <div class="active-filters" id="activePills"></div>
        </div>

        <div class="results-meta" id="resultsMeta" style="display:none">
            <span class="results-count" id="resultsCount"></span>
        </div>

        <div id="table-container"></div>
        <div class="pagination" id="pagination"></div>
    </main>

    <script src="final.js"></script>
</body>
</html>
